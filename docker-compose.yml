services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fashion
      POSTGRES_PASSWORD: fashion
      POSTGRES_DB: fashion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://fashion:fashion@postgres:5432/fashion
      REDIS_URL: redis://redis:6379/0
      PUBLIC_ASSETS_BASE_URL: http://localhost:8000
      CORS_ORIGINS: '["http://localhost:3000"]'
      CLASSIFICATION_EXECUTION: arq
      CLASSIFIER_BACKEND: heuristic
      STORAGE_BACKEND: local
      STORAGE_ROOT: /data
    volumes:
      - backend-data:/data
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["arq", "app.worker_settings.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+psycopg://fashion:fashion@postgres:5432/fashion
      REDIS_URL: redis://redis:6379/0
      PUBLIC_ASSETS_BASE_URL: http://localhost:8000
      CLASSIFIER_BACKEND: heuristic
      STORAGE_BACKEND: local
      STORAGE_ROOT: /data
    volumes:
      - backend-data:/data
    depends_on:
      - postgres
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  pgdata:
  backend-data:
